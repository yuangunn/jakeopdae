name: 필수교육-자동화
description: 강의 [다음] 버튼이 보이면 클릭, URL 바뀌면 다음 강의로 진행
steps:
- id: step1
  name: 시간 대기
  trigger:
    type: time
    delay_s: 1.0
  action:
    type: web_navigate
    url: https://sela.yuhs.ac/home/user/loginForm
    wait_until: load
  on_failure: abort
  retry_count: 0
  on_success_goto: null
  on_failure_goto: null
  repeat: 1
max_total_runtime_s: 7200.0
web_session:
  mode: attach
  cdp_endpoint: http://localhost:9222
  browser_channel: chrome
  headless: false
  new_page: false
variables: {}
