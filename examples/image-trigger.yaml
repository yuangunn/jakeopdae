# Example macro: wait for an icon to appear inside a region, click it,
# then press Escape.
#
# Capture a small PNG of the icon you want to track and save it next to
# this YAML file as `templates/new_post_icon.png`. The region below should
# enclose where the icon can possibly appear.

name: image-trigger
description: Wait for an icon, click it (offset from the match center).
max_total_runtime_s: 600

steps:
  - id: wait_for_icon
    name: wait until icon appears
    trigger:
      type: image
      template: templates/new_post_icon.png
      region: { x: 100, y: 200, w: 800, h: 600 }
      confidence: 0.92
      timeout_s: 60
      poll_interval_s: 0.5
      multi_scale: true
    action:
      type: click
      relative_to_match: true
      x: 0
      y: 0
    on_failure: retry
    retry_count: 2

  - id: dismiss
    name: close popup with esc
    trigger:
      type: time
      delay_s: 0.5
    action:
      type: key
      keys: escape
